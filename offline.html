<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Krishna Glass House</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/48.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Krishna Glass">
  <link rel="apple-touch-icon" href="/images/icon-192.png">
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #f8fbff 0%, #eef2f7 55%, #e7ecf5 100%);
      color: #1a1a2e;
    }
    .card {
      max-width: 560px;
      margin: 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(26, 26, 46, 0.14);
      padding: 32px;
      text-align: center;
      border: 1px solid #e8ecf4;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.9rem;
      line-height: 1.2;
    }
    p {
      margin: 0 0 22px;
      color: #4b5563;
      line-height: 1.65;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 600;
      transition: transform .2s ease;
    }
    a:hover { transform: translateY(-2px); }
    .primary {
      background: #1a1a2e;
      color: #ffffff;
    }
    .secondary {
      background: #eef2ff;
      color: #1a1a2e;
    }
  </style>
  <link rel="canonical" href="https://www.krishnaglasshouse.com/offline.html">

  <meta property="og:site_name" content="Krishna Glass House">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Krishna Glass House">
</head>
<body>
  <main class="card">
    <h1>You are offline right now</h1>
    <p>
      Internet connection unavailable, but the app is ready in offline mode. Reconnect to sync latest pages and gallery updates.
    </p>
    <div class="actions">
      <a class="primary" href="/">Go Home</a>
      <a class="secondary" href="tel:+918700162623">Call +91 87001 62623</a>
    </div>
  </main>
</body>
</html>
