<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog - Krishna Glass House</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050b14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f4f8;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --hover-transform: translateY(-8px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(15, 32, 39, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(32, 58, 67, 1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar / Header */
        header {
            padding: 3rem 5%;
            text-align: center;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Filter Section */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 2rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 11, 20, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Catalog Grid */
        .catalog-container {
            padding: 4rem 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Product Card */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            group: card;
        }

        .product-card:hover {
            transform: var(--hover-transform);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .image-wrapper {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .product-card:hover .image-wrapper img {
            transform: scale(1.1);
        }

        .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5, 11, 20, 0.9) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover .image-overlay {
            opacity: 1;
        }

        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .card-content {
            padding: 1.5rem;
            position: relative;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .product-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .inquire-btn {
            background: transparent;
            color: var(--accent);
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .inquire-btn:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .inquire-btn::after {
            content: '→';
            transition: transform 0.3s ease;
        }

        .inquire-btn:hover::after {
            transform: translateX(5px);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        /* Empty state */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .catalog-container { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; padding: 2rem 5%; }
            .filters { padding: 1rem 5%; gap: 0.5rem; }
            .filter-btn { padding: 0.6rem 1rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

            { id: 43, name: "Sensor Sliding Glass Door", category: "glass-pvc", categoryLabel: "Glass & PVC", desc: "Automated entry systems for retail and commercial spaces.", img: "https://loremflickr.com/400/300/automatic,door?random=43" },

        const catalogContainer = document.getElementById('catalogContainer');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const noResults = document.getElementById('noResults');

        function renderProducts(filter = 'all') {
            // Clear existing products (keep no-results message)
            const cards = catalogContainer.querySelectorAll('.product-card');
            cards.forEach(card => card.remove());

            const filteredProducts = filter === 'all' 
                ? products 
                : products.filter(p => p.category === filter);

            if (filteredProducts.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                
                filteredProducts.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${product.img}" alt="${product.name}" loading="lazy">
                            <div class="image-overlay"></div>
                            <span class="category-badge">${product.categoryLabel}</span>
                        </div>
                        <div class="card-content">
                            <h3 class="product-title">${product.name}</h3>
                            <p class="product-desc">${product.desc}</p>
                            <div class="card-footer">
                                <button class="inquire-btn" onclick="alert('Inquiry for ${product.name}')">Inquire Now</button>
                            </div>
                        </div>
                    `;
                    catalogContainer.appendChild(card);
                });
            }
        }

        // Initialize
        renderProducts();

        // Filter Logic
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active class
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Filter and render
                renderProducts(btn.dataset.filter);
            });
        });
    </script>
