<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Krishna Glass House Janakpuri</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/48.png">
  <style>
    .error-container {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      background: linear-gradient(45deg, #1a1a2e, #16213e);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      line-height: 1;
    }
    .error-title {
      font-size: 2rem;
      color: #333;
      margin-top: -1rem;
      margin-bottom: 1.5rem;
    }
    .error-text {
      font-size: 1.1rem;
      color: #666;
      max-width: 500px;
      margin-bottom: 2rem;
    }
    .btn-return {
      padding: 1rem 2.5rem;
      background: #1a1a2e;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(26, 26, 46, 0.2);
    }
    .btn-return:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(26, 26, 46, 0.3);
      filter: brightness(1.2);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Looking for something clear?</h1>
    <p class="error-text">
        The page you’re looking for has shattered or been removed. But don't worry, our glass partitions are still here to stay.
    </p>
    <a href="/" class="btn btn-return">Return Home</a>
  </div>
</body>
</html>
